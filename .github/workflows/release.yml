name: Release Addon

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: get_version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Tag push trigger
            TAG_NAME="${{ github.ref_name }}"
            VERSION=$(echo "$TAG_NAME" | sed 's/^v//')
            echo "Triggered by tag: $TAG_NAME. Version is $VERSION."
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
            echo "CREATE_TAG=false" >> $GITHUB_ENV
          else
            # Push to main trigger
            # Extract version from TOC file
            VERSION=$(grep "^## Version:" ShellcoinTicker.toc | sed 's/## Version: //g' | tr -d '\r')
            TAG_NAME="v$VERSION"
            echo "Triggered by push to main. TOC Version is $VERSION."
            
            # Check if tag already exists in remote
            if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              echo "Tag $TAG_NAME already exists. Skipping release creation."
              echo "CREATE_TAG=false" >> $GITHUB_ENV
              echo "SKIP_RELEASE=true" >> $GITHUB_ENV
            else
              echo "Tag $TAG_NAME does not exist. Will tag and release."
              echo "VERSION=$VERSION" >> $GITHUB_ENV
              echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
              echo "CREATE_TAG=true" >> $GITHUB_ENV
              echo "SKIP_RELEASE=false" >> $GITHUB_ENV
            fi
          fi

      - name: Push Git Tag
        if: env.SKIP_RELEASE != 'true' && env.CREATE_TAG == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ env.TAG_NAME }}
          git push origin ${{ env.TAG_NAME }}

      - name: Package Addon ZIP
        if: env.SKIP_RELEASE != 'true'
        run: |
          mkdir -p ShellcoinTicker
          # Copy only required addon files and directories
          cp -r Core.lua UI.lua UI_Graph.lua UI_Minimap.lua UI_Options.lua ShellcoinTicker.toc README.md LICENSE Screenshots ShellcoinTicker/
          # Create ZIP
          zip -r ShellcoinTicker.zip ShellcoinTicker

      - name: Create GitHub Release
        if: env.SKIP_RELEASE != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: ShellcoinTicker.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
